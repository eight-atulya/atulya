  # Atulya dashboards
  - name: "Atulya Operations"
    type: file
    options:
      path: /otel-lgtm/atulya-operations.json
      foldersFromFilesStructure: false
  - name: "Atulya LLM"
    type: file
    options:
      path: /otel-lgtm/atulya-llm.json
      foldersFromFilesStructure: false
  - name: "Atulya API Service"
    type: file
    options:
      path: /otel-lgtm/atulya-api-service.json
      foldersFromFilesStructure: false
