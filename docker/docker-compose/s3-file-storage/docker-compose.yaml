# Docker Compose file for Atulya with S3 file storage (SeaweedFS)
#
# SeaweedFS (Apache 2.0) provides an S3-compatible object storage backend
# for storing uploaded files instead of PostgreSQL BYTEA storage.
#
# Make sure to set the required environment variables before running:
# - ATULYA_DB_PASSWORD: Password for the PostgreSQL user
# - Configure LLM provider variables as needed (see below in the atulya service)
#
# Usage:
# docker compose up -d
#
# Optional environment variables with defaults:
# - ATULYA_VERSION: Atulya application version (default: latest)
# - ATULYA_DB_USER: PostgreSQL user (default: atulya_user)
# - ATULYA_DB_NAME: PostgreSQL database name (default: atulya_db)
# - ATULYA_DB_VERSION: PostgreSQL version (default: 18)
# - SEAWEEDFS_S3_ACCESS_KEY: S3 access key (default: atulya_s3_key)
# - SEAWEEDFS_S3_SECRET_KEY: S3 secret key (default: atulya_s3_secret)

services:
  db:
    image: pgvector/pgvector:pg${ATULYA_DB_VERSION:-18}
    container_name: atulya-db
    restart: always
    environment:
      POSTGRES_USER: ${ATULYA_DB_USER:-atulya_user}
      POSTGRES_PASSWORD: ${ATULYA_DB_PASSWORD:?Please set the ATULYA_DB_PASSWORD env variable}
      POSTGRES_DB: ${ATULYA_DB_NAME:-atulya_db}
    volumes:
      - pg_data:/var/lib/postgresql/${ATULYA_DB_VERSION:-18}/docker
    networks:
      - atulya-net

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: atulya-seaweedfs
    restart: always
    # Single-node mode: master + volume + filer + S3 gateway all in one process
    command: >
      server
      -s3
      -s3.port=8333
      -s3.config=/etc/seaweedfs/s3.json
      -ip.bind=0.0.0.0
    volumes:
      - seaweedfs_data:/data
      - ./s3.json:/etc/seaweedfs/s3.json:ro
    # Expose S3 API port (uncomment to access from host)
    # ports:
    #   - "8333:8333"
    networks:
      - atulya-net

  atulya:
    image: ghcr.io/eight-atulya/atulya:${ATULYA_VERSION:-latest}
    container_name: atulya-app
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      - ATULYA_API_LLM_API_KEY=${OPENAI_API_KEY?Please set the OPENAI_API_KEY env variable}
      - ATULYA_API_DATABASE_URL=postgresql://${ATULYA_DB_USER:-atulya_user}:${ATULYA_DB_PASSWORD:?Please set the ATULYA_DB_PASSWORD env variable}@db:5432/${ATULYA_DB_NAME:-atulya_db}
      # S3 file storage configuration (SeaweedFS)
      - ATULYA_API_FILE_STORAGE_TYPE=s3
      - ATULYA_API_FILE_STORAGE_S3_BUCKET=atulya
      - ATULYA_API_FILE_STORAGE_S3_ENDPOINT=http://seaweedfs:8333
      - ATULYA_API_FILE_STORAGE_S3_REGION=us-east-1
      - ATULYA_API_FILE_STORAGE_S3_ACCESS_KEY_ID=${SEAWEEDFS_S3_ACCESS_KEY:-atulya_s3_key}
      - ATULYA_API_FILE_STORAGE_S3_SECRET_ACCESS_KEY=${SEAWEEDFS_S3_SECRET_KEY:-atulya_s3_secret}
    depends_on:
      - db
      - seaweedfs
    networks:
      - atulya-net

networks:
  atulya-net:
    driver: bridge

volumes:
  pg_data:
  seaweedfs_data:
