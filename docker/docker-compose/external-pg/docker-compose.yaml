# Docker Compose file for Atulya with PostgreSQL and pgvector
#
# Make sure to set the required environment variables before running:
# - ATULYA_DB_PASSWORD: Password for the PostgreSQL user
# - Configure LLM provider variables as needed (see below in the atulya service)
#
# Usage:
# docker compose up -d
#
# Optional environment variables with defaults:
# - ATULYA_VERSION: Atulya application version (default: latest)
# - ATULYA_DB_USER: PostgreSQL user (default: atulya_user)
# - ATULYA_DB_NAME: PostgreSQL database name (default: atulya_db)
# - ATULYA_DB_VERSION: PostgreSQL version (default: 18)

services:
  db:
    # Use a PostgreSQL-Image with pgvector extension pre-installed
    # see https://hub.docker.com/r/pgvector/pgvector 
    image: pgvector/pgvector:pg${ATULYA_DB_VERSION:-18}
    container_name: atulya-db
    restart: always
    # Expose PostgreSQL port
    # ports:
      # - "5432:5432"
    environment:
      POSTGRES_USER: ${ATULYA_DB_USER:-atulya_user}
      POSTGRES_PASSWORD: ${ATULYA_DB_PASSWORD:?Please set the ATULYA_DB_PASSWORD env variable}
      POSTGRES_DB: ${ATULYA_DB_NAME:-atulya_db}
    volumes:
      - pg_data:/var/lib/postgresql/${ATULYA_DB_VERSION:-18}/docker
    networks:
      - atulya-net

  atulya:
    image: ghcr.io/eight-atulya/atulya:${ATULYA_VERSION:-latest}
    container_name: atulya-app
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      - ATULYA_API_LLM_API_KEY=${OPENAI_API_KEY?Please set the OPENAI_API_KEY env variable}
      - ATULYA_API_DATABASE_URL=postgresql://${ATULYA_DB_USER:-atulya_user}:${ATULYA_DB_PASSWORD:?Please set the ATULYA_DB_PASSWORD env variable}@db:5432/${ATULYA_DB_NAME:-atulya_db}
    depends_on:
      - db
    networks:
      - atulya-net

networks:
  atulya-net:
    driver: bridge

volumes:
  pg_data:
