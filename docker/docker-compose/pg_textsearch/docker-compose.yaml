name: atulya
# Docker Compose file for Atulya with PostgreSQL and Timescale pg_textsearch
# docker compose -f docker/docker-compose/pg_textsearch/docker-compose.yaml down && sleep 2 && docker compose -f docker/docker-compose/pg_textsearch/docker-compose.yaml up -d
# Make sure to set the required environment variables before running:
# - ATULYA_DB_PASSWORD: Password for the PostgreSQL user
# - Configure LLM provider variables as needed (see below in the atulya service)
#
# Usage:
# docker compose up -d
#
# Optional environment variables with defaults:
# - ATULYA_VERSION: Atulya application version (default: latest)
# - ATULYA_DB_USER: PostgreSQL user (default: atulya_user)
# - ATULYA_DB_NAME: PostgreSQL database name (default: atulya_db)

services:
  db:
    # Use custom PostgreSQL image with pgvector and pg_textsearch extensions
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atulya-db
    restart: always
    # Expose PostgreSQL port
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: ${ATULYA_DB_USER:-atulya_user}
      POSTGRES_PASSWORD: ${ATULYA_DB_PASSWORD:-atulya_password}
      POSTGRES_DB: ${ATULYA_DB_NAME:-atulya_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - atulya-net

  pg-textsearch-init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      - PGPASSWORD=${ATULYA_DB_PASSWORD:-atulya_password}
    command: >
      bash -c "
        echo 'Waiting for PostgreSQL to be ready...';
        until pg_isready -h atulya-db -p 5432 -U atulya_user; do
          echo 'PostgreSQL is unavailable - sleeping';
          sleep 2;
        done;
        echo 'PostgreSQL is ready - creating atulya_db database';
        psql -h atulya-db -p 5432 -U atulya_user -c 'CREATE DATABASE atulya_db;' 2>/dev/null || echo 'Database already exists';
        echo 'Creating extensions in atulya_db database';
        psql -h atulya-db -p 5432 -U atulya_user -d atulya_db -c 'CREATE EXTENSION IF NOT EXISTS vector CASCADE;';
        psql -h atulya-db -p 5432 -U atulya_user -d atulya_db -c 'CREATE EXTENSION IF NOT EXISTS pg_textsearch CASCADE;';
        echo 'Database and extensions created successfully';
      "
    restart: "no"
    networks:
      - atulya-net

  atulya:
    image: ghcr.io/eight-atulya/atulya:${ATULYA_VERSION:-latest}
    container_name: atulya-app
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      # LLM Configuration
      ATULYA_API_LLM_PROVIDER: ${ATULYA_API_LLM_PROVIDER:-openai}
      ATULYA_API_LLM_API_KEY: ${OPENAI_API_KEY:-your-api-key}

      # Database Configuration
      ATULYA_API_DATABASE_URL: postgresql://${ATULYA_DB_USER:-atulya_user}:${ATULYA_DB_PASSWORD:-atulya_password}@db:5432/${ATULYA_DB_NAME:-atulya_db}

      # Vector and Text Search Extensions
      ATULYA_API_VECTOR_EXTENSION: pgvector
      ATULYA_API_TEXT_SEARCH_EXTENSION: pg_textsearch

    depends_on:
      - db
    networks:
      - atulya-net


networks:
  atulya-net:
    driver: bridge

volumes:
  pg_data:
