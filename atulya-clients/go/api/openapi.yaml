openapi: 3.1.0
info:
  contact:
    name: Memory System
  description: HTTP API for Atulya
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: Atulya HTTP API
  version: 0.8.7
servers:
- url: /
paths:
  /health:
    get:
      description: Checks the health of the API and database connection
      operationId: health_endpoint_health_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Health check endpoint
      tags:
      - Monitoring
  /version:
    get:
      description: Returns API version information and enabled feature flags. Use
        this to check which capabilities are available in this deployment.
      operationId: get_version
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
          description: Successful Response
      summary: Get API version and feature flags
      tags:
      - Monitoring
  /metrics:
    get:
      description: Exports metrics in Prometheus format for scraping
      operationId: metrics_endpoint_metrics_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Prometheus metrics endpoint
      tags:
      - Monitoring
  /v1/default/banks/{bank_id}/graph:
    get:
      description: "Retrieve graph data for visualization, optionally filtered by\
        \ type (world/experience/opinion)."
      operationId: get_graph
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: true
        in: query
        name: type
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 1000
          title: Limit
          type: integer
        style: form
      - explode: true
        in: query
        name: q
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: tags
        required: false
        schema:
          items:
            nullable: true
            type: string
          nullable: true
          type: array
        style: form
      - explode: true
        in: query
        name: tags_match
        required: false
        schema:
          default: all_strict
          title: Tags Match
          type: string
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphDataResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get memory graph data
      tags:
      - Memory
  /v1/default/banks/{bank_id}/timeline:
    get:
      description: "Retrieve git-style timeline items and edges for facts, observations,\
        \ and mental models."
      operationId: get_timeline
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: true
        in: query
        name: type
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 500
          title: Limit
          type: integer
        style: form
      - explode: true
        in: query
        name: q
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: tags
        required: false
        schema:
          items:
            type: string
          nullable: true
          type: array
        style: form
      - explode: true
        in: query
        name: tags_match
        required: false
        schema:
          default: all_strict
          enum:
          - any
          - all
          - any_strict
          - all_strict
          title: Tags Match
          type: string
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimelineResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get normalized timeline data
      tags:
      - Memory
  /v1/default/banks/{bank_id}/graph/intelligence:
    get:
      description: "Retrieve a state/topic graph with high-confidence changes, contradictions,\
        \ and stale signals."
      operationId: get_graph_intelligence
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: true
        in: query
        name: type
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 18
          title: Limit
          type: integer
        style: form
      - explode: true
        in: query
        name: q
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: tags
        required: false
        schema:
          items:
            type: string
          nullable: true
          type: array
        style: form
      - explode: true
        in: query
        name: tags_match
        required: false
        schema:
          default: all_strict
          enum:
          - any
          - all
          - any_strict
          - all_strict
          title: Tags Match
          type: string
        style: form
      - explode: true
        in: query
        name: confidence_min
        required: false
        schema:
          default: 0.55
          maximum: 1.0
          minimum: 0.0
          title: Confidence Min
          type: number
        style: form
      - explode: true
        in: query
        name: node_kind
        required: false
        schema:
          default: all
          enum:
          - all
          - entity
          - topic
          title: Node Kind
          type: string
        style: form
      - explode: true
        in: query
        name: window_days
        required: false
        schema:
          minimum: 1
          nullable: true
          type: integer
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphIntelligenceResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get graph intelligence state graph
      tags:
      - Memory
  /v1/default/banks/{bank_id}/graph/investigate:
    post:
      description: "Ask a focused question over the state graph and return the relevant\
        \ change events, evidence path, and checks."
      operationId: investigate_graph
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphInvestigationRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphInvestigationResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Investigate graph intelligence
      tags:
      - Memory
  /v1/default/banks/{bank_id}/anomaly/intelligence:
    post:
      operationId: get_anomaly_intelligence
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnomalyIntelligenceRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnomalyIntelligenceResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get anomaly intelligence for bank
      tags:
      - Memory
  /v1/default/banks/{bank_id}/graph/summary:
    get:
      description: Retrieve a clustered graph summary and top-use nodes for scalable
        graph exploration.
      operationId: get_graph_summary
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: true
        in: query
        name: surface
        required: false
        schema:
          default: state
          enum:
          - state
          - evidence
          title: Surface
          type: string
        style: form
      - explode: true
        in: query
        name: type
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: q
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: tags
        required: false
        schema:
          items:
            type: string
          nullable: true
          type: array
        style: form
      - explode: true
        in: query
        name: tags_match
        required: false
        schema:
          default: all_strict
          enum:
          - any
          - all
          - any_strict
          - all_strict
          title: Tags Match
          type: string
        style: form
      - explode: true
        in: query
        name: confidence_min
        required: false
        schema:
          default: 0.55
          maximum: 1.0
          minimum: 0.0
          title: Confidence Min
          type: number
        style: form
      - explode: true
        in: query
        name: node_kind
        required: false
        schema:
          default: all
          enum:
          - all
          - entity
          - topic
          title: Node Kind
          type: string
        style: form
      - explode: true
        in: query
        name: window_days
        required: false
        schema:
          minimum: 1
          nullable: true
          type: integer
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphSummaryResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get scalable graph summary
      tags:
      - Memory
  /v1/default/banks/{bank_id}/graph/neighborhood:
    get:
      description: Retrieve a bounded neighborhood for focused graph exploration and
        detail rendering.
      operationId: get_graph_neighborhood
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: true
        in: query
        name: surface
        required: false
        schema:
          default: state
          enum:
          - state
          - evidence
          title: Surface
          type: string
        style: form
      - explode: true
        in: query
        name: type
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: q
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: tags
        required: false
        schema:
          items:
            type: string
          nullable: true
          type: array
        style: form
      - explode: true
        in: query
        name: tags_match
        required: false
        schema:
          default: all_strict
          enum:
          - any
          - all
          - any_strict
          - all_strict
          title: Tags Match
          type: string
        style: form
      - explode: true
        in: query
        name: confidence_min
        required: false
        schema:
          default: 0.55
          maximum: 1.0
          minimum: 0.0
          title: Confidence Min
          type: number
        style: form
      - explode: true
        in: query
        name: node_kind
        required: false
        schema:
          default: all
          enum:
          - all
          - entity
          - topic
          title: Node Kind
          type: string
        style: form
      - explode: true
        in: query
        name: window_days
        required: false
        schema:
          minimum: 1
          nullable: true
          type: integer
        style: form
      - explode: true
        in: query
        name: focus_ids
        required: false
        schema:
          items:
            type: string
          nullable: true
          type: array
        style: form
      - explode: true
        in: query
        name: depth
        required: false
        schema:
          default: 1
          maximum: 3
          minimum: 1
          title: Depth
          type: integer
        style: form
      - explode: true
        in: query
        name: limit_nodes
        required: false
        schema:
          default: 60
          maximum: 120
          minimum: 1
          title: Limit Nodes
          type: integer
        style: form
      - explode: true
        in: query
        name: limit_edges
        required: false
        schema:
          default: 140
          maximum: 300
          minimum: 1
          title: Limit Edges
          type: integer
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphNeighborhoodResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get focused graph neighborhood
      tags:
      - Memory
  /v1/default/banks/{bank_id}/memories/list:
    get:
      description: "List memory units with pagination and optional full-text search.\
        \ Supports filtering by type. Results are sorted by most recent first (mentioned_at\
        \ DESC, then created_at DESC)."
      operationId: list_memories
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: true
        in: query
        name: type
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: q
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: branch_name
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          title: Limit
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          title: Offset
          type: integer
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMemoryUnitsResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List memory units
      tags:
      - Memory
  /v1/default/banks/{bank_id}/memories/{memory_id}:
    get:
      description: "Get a single memory unit by ID with all its metadata including\
        \ entities and tags. Note: the 'history' field is deprecated and always returns\
        \ an empty list - use GET /memories/{memory_id}/history instead."
      operationId: get_memory
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: memory_id
        required: true
        schema:
          title: Memory Id
          type: string
        style: simple
      - explode: true
        in: query
        name: branch_name
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get memory unit
      tags:
      - Memory
  /v1/default/banks/{bank_id}/memories/{memory_id}/history:
    get:
      description: "Get the full history of an observation, with each change's source\
        \ facts resolved to their text."
      operationId: get_observation_history
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: memory_id
        required: true
        schema:
          title: Memory Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get observation history
      tags:
      - Memory
  /v1/default/banks/{bank_id}/memories/recall:
    post:
      description: |-
        Recall memory using semantic similarity and spreading activation.

        The type parameter is optional and must be one of:
        - `world`: General knowledge about people, places, events, and things that happen
        - `experience`: Memories about experience, conversations, actions taken, and tasks performed
      operationId: recall_memories
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecallRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecallResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Recall memory
      tags:
      - Memory
  /v1/default/banks/{bank_id}/llm-requests:
    get:
      description: List database-backed LLM request traces for one bank.
      operationId: list_llm_requests
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - description: Maximum trace rows to return
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          description: Maximum trace rows to return
          maximum: 500
          minimum: 1
          title: Limit
          type: integer
        style: form
      - description: Rows to skip
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          description: Rows to skip
          minimum: 0
          title: Offset
          type: integer
        style: form
      - description: Filter by trace ID
        explode: true
        in: query
        name: trace_id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: "Filter by status, e.g. success or error"
        explode: true
        in: query
        name: status
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: "Filter by operation, e.g. retain or reflect"
        explode: true
        in: query
        name: operation
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Filter by LLM provider
        explode: true
        in: query
        name: provider
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMRequestListResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List LLM request traces
      tags:
      - Memory
  /v1/default/banks/{bank_id}/llm-requests/stats:
    get:
      description: Return time-bucketed LLM request counts and token totals for one
        bank.
      operationId: get_llm_request_stats
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - description: Lookback period in hours
        explode: true
        in: query
        name: period_hours
        required: false
        schema:
          default: 24
          description: Lookback period in hours
          maximum: 2160
          minimum: 1
          title: Period Hours
          type: integer
        style: form
      - description: Time bucket size
        explode: true
        in: query
        name: trunc
        required: false
        schema:
          default: hour
          description: Time bucket size
          enum:
          - minute
          - hour
          - day
          title: Trunc
          type: string
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMRequestStatsResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get LLM request trace statistics
      tags:
      - Memory
  /v1/default/banks/{bank_id}/reflect:
    post:
      description: |-
        Reflect and formulate an answer using bank identity, world facts, and opinions.

        This endpoint:
        1. Retrieves experience (conversations and events)
        2. Retrieves world facts relevant to the query
        3. Retrieves existing opinions (bank's perspectives)
        4. Uses LLM to formulate a contextual answer
        5. Returns plain text answer and the facts used
      operationId: reflect
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReflectRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReflectResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Reflect and generate answer
      tags:
      - Memory
  /v1/default/banks/{bank_id}/internet/research:
